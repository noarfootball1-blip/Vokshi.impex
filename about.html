<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Contact</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #0f172a, #111827);
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .contact-box {
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(12px);
      padding: 40px;
      border-radius: 20px;
      width: 750px;
      text-align: center;
      box-shadow: 0 10px 30px rgba(0,0,0,0.4);
    }

    h1 {
      margin-bottom: 20px;
    }

    .btn {
      display: block;
      margin: 12px 0;
      padding: 12px;
      border-radius: 10px;
      text-decoration: none;
      color: white;
      font-weight: bold;
      transition: 0.3s;
    }

    .insta {
      background: linear-gradient(45deg, #f09433, #e6683c, #dc2743, #cc2366);
    }

    .insta:hover {
      transform: scale(1.05);
    }

    .whatsapp {
      background: #25D366;
    }

    .whatsapp:hover {
      transform: scale(1.05);
    }

    .email {
      background: #3b82f6;
    }

    .email:hover {
      transform: scale(1.05);
    }

    .home {
      margin-top: 20px;
      display: inline-block;
      color: #aaa;
      text-decoration: none;
      font-size: 14px;
    }

    .home:hover {
      color: white;
    }
    .facebook{
      background-color: #2e23cc;
    }
  </style>
</head>

<body>

  <div class="contact-box">

      💬 WhatsApp
    </a>

    <!-- EMAIL -->
    <a class="btn email" href="mailto:vokshi-impex@outlook.com">
      
      vokshi-impex@outlook.com
    </a>

     <a class="btn facebook" href="https://www.facebook.com/profile.php?id=61575785500176" target="_blank">📘 Facebook</a>
